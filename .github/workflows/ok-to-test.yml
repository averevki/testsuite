name: Kuadrant PR Tests
on:
  issue_comment:
    types: [created]

jobs:
  kuadrant-test:
    if: |
      github.event.issue.pull_request && 
      startsWith(github.event.comment.body, '/run ')
    runs-on: ubuntu-latest

    steps:
      - name: Extract and validate Make target
        id: extract-target
        run: |
          # Extract target from comment
          TARGET=$(echo "${{ github.event.comment.body }}" | awk '{print $2}')
          
          # Validate target
          ALLOWED_TARGETS="test kuadrant authorino authorino-standalone dnstls smoke"
          if [[ ! " ${ALLOWED_TARGETS} " =~ " ${TARGET} " ]]; then
            echo "::error::Invalid target '${TARGET}'. Allowed targets: ${ALLOWED_TARGETS}"
            exit 1
          fi
          
          echo "target=${TARGET}" >> $GITHUB_OUTPUT
          echo "Running make ${TARGET}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Create KIND cluster
        uses: helm/kind-action@v1
        with:
          version: "v0.27.0"

      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system --type=json -p '[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'

      - name: Install MetalLB
        run: |
          kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.13.12/config/manifests/metallb-native.yaml
          kubectl wait --namespace metallb-system --for=condition=ready pod --selector=app=metallb --timeout=90s
          echo "apiVersion: v1
          kind: ConfigMap
          metadata:
            namespace: metallb-system
            name: config
          data:
            config: |
              address-pools:
              - name: default
                protocol: layer2
                addresses:
                - 172.18.255.200-172.18.255.250" | kubectl apply -f -

      - name: Install Gateway API CRDs
        run: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.3/cert-manager.yaml
          kubectl wait --namespace cert-manager --for=condition=Available deployment/cert-manager --timeout=120s

      - name: Install Sail Operator
        run: |
          helm repo add sail-operator https://istio-ecosystem.github.io/sail-operator
          helm install sail-operator \
            --create-namespace \
            --namespace istio-system \
            --wait \
            --timeout=300s \
            sail-operator/sail-operator \
            --version 1.0.0

      - name: Create Istio objects
        run: |
          # Add your Istio CRDs/objects here
          echo "Apply your Istio custom resources"

      - name: Create namespaces
        run: |
          kubectl create namespace kuadrant
          kubectl create namespace kuadrant2

      - name: Deploy Kuadrant
        run: |
          helm repo add kuadrant https://kuadrant.io/helm-charts/ --force-update
          helm install kuadrant-operator kuadrant/kuadrant-operator --create-namespace --namespace kuadrant-system
          kubectl -n kuadrant-system wait --timeout=300s --for=condition=Available deployments --all

      - name: Add kuadrant-sample
        run: |
          kubectl apply -f - <<EOF
          apiVersion: kuadrant.io/v1beta1
          kind: Kuadrant
          metadata:
            name: kuadrant-sample
            namespace: kuadrant-system
          spec: {}
          EOF
          
          kubectl wait kuadrant/kuadrant-sample --for=condition=Ready=True -n kuadrant-system

#      - name: Restart Kuadrant Operator
#        run: kubectl rollout restart deployment kuadrant-operator-controller-manager -n kuadrant-system

#      - name: Run Make target
#        run: make ${{ steps.extract-target.outputs.target }}

      - name: Run Make target and capture output
        id: test-run
        run: |
          # Run tests and capture output
          TEST_OUTPUT=$(make ${{ steps.extract-target.outputs.target }} 2>&1)
          
          # Extract test results (assuming pytest output format)
          TEST_RESULTS=$(echo "$TEST_OUTPUT" | grep -E '[0-9]+ passed|[0-9]+ failed' || true)
          
          # Save output and results
          echo "test_output<<EOF" >> $GITHUB_OUTPUT
          echo "$TEST_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "test_results=${TEST_RESULTS:-No test results found}" >> $GITHUB_OUTPUT
          
          # Print output for logs
          echo "$TEST_OUTPUT"

      - name: Comment test results on PR
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `Test run completed for target \`${{ steps.extract-target.outputs.target }}\`:
            \`\`\`
            ${{ steps.test-run.outputs.test_results }}
            \`\`\`
            
            Full logs available in the workflow run.`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
